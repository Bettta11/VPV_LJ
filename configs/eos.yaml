project: eos
output_dir: data/eos/eos_001

sweep:
  temperatures: [0.70, 0.85, 1.00]
  densities: [0.01, 0.04, 0.08]
  seeds: [1]

units:
  sigma: 1.0
  epsilon: 1.0
  mass: 1.0
  kB: 1.0

potential:
  type: LJ
  rcut: 2.5

system:
  N: 256
  dimension: 3
  box_mode: density
  boundary: periodic
  init: auto

external_field:
  type: none
  g: 0.0

thermostat:
  type: langevin
  friction: 0.2

run:
  dt: 0.002
  equil_steps: 1000
  prod_steps: 2000

save:
  points_csv: true
  trace:
    enabled: false
    interval: 1000
  final_profile:
    enabled: true
    bins_z: 40
    source: final_window
    final_window_samples: 10
  trajectory:
    enabled: false

